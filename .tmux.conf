#!/bin/zsh
#tmux version 2.2

# 0 is too far from ` ;)
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Reload tmux config
bind r source-file /home/vijay/.tmux.conf \; display-message "Config reloaded!"
bind R movew -r \; display-message "Windows renumbered!"

# prefix binding key
unbind C-b
set -g prefix `
bind-key ` send-prefix

# vertical and horizontal panes
unbind %
bind v split-window -h
unbind '"'
bind h split-window -v

# clear the scrollback buffer
bind -n C-k send-keys -R \; clear-history

# increase the scrollback size
# default value is 2000
# https://stackoverflow.com/questions/18760281/how-to-increase-scrollback-buffer-size-in-tmux
set-option -g history-limit 3000

# change the key bindings to vi for copy mode so to use j, k, l, h
setw -g mode-keys vi

# Use Alt-vim keys without prefix key to switch panes
#bind -n M-h select-pane -L
#bind -n M-j select-pane -D
#bind -n M-k select-pane -U
#bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# don't allow to rename the name of the window
set-option -g allow-rename off

# vim resize panel
bind < resize-pane -L 1
bind > resize-pane -R 1

# For using 256 color terminal in tmux
set -g default-terminal "screen-256color"

#----------------------------------------------------------------------
# Pane settings - use hook to apply after everything loads
#----------------------------------------------------------------------
set-hook -g client-attached "set -g pane-border-lines heavy"
set-hook -ga client-attached "set -g pane-border-style fg=colour244"
set-hook -ga client-attached "set -g pane-active-border-style fg=colour51"
set-hook -ga client-attached "set -g pane-border-status top"
set-hook -ga client-attached { set -g pane-border-format '#{?pane_active,#[fg=colour51],#[fg=red]} #{pane_index}: #{@pane_name}#[default]' }
bind T command-prompt -p "Pane name:" 'set-option -p @pane_name "%%"'

# Make zsh my default shell for tmux sessions
set-option -g default-shell $SHELL

# powerline status bar
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "centre"
set-option -g status-left-length 60
set-option -g status-right-length 90
set-option -g status-left "#($HOME/.tmux/plugins/tmux-powerline/powerline.sh left)"
set-option -g status-right "#($HOME/.tmux/plugins/tmux-powerline/powerline.sh right)"

# https://superuser.com/questions/880497/how-do-i-resize-the-usable-area-of-a-tmux-session
# aggresive resize
setw -g aggressive-resize on

# easily toggle synchronization (mnemonic: e is for echo)
# sends input to all panes in a given window.
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# Highlight bell when some process has finished in non current window
# https://stackoverflow.com/questions/23755063/alert-in-tmux-when-a-process-completes
# Usage: $ some-command; echo -e '\a'
set-window-option -g visual-bell on
set-window-option -g bell-action other

#----------------------------------------------------------------------
# List of plugins to install
# Hit prefix + I to fetch and source the plugin
#----------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
# Able to resurrect the tmux session on machine crash 
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Being able to store the tmux session autmatically
set -g @plugin 'tmux-plugins/tmux-continuum'
# Copy to the system clipboard in tmux
set -g @plugin 'tmux-plugins/tmux-yank'
# easymotion-style jumps in copy-mode (prefix + j, then a char, then hint letters)
set -g @plugin 'schasse/tmux-jump'

#----------------------------------------------------------------------
# Plugins settings
#----------------------------------------------------------------------
# Last saved enviornment is automatically restored when tmux is started
set -g @continuum-restore 'on'

# Force tmux-yank to use xclip on Linux instead of falling back to a pbcopy alias
set -g @override_copy_command 'xclip -selection clipboard'

#----------------------------------------------------------------------
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
#----------------------------------------------------------------------# 
run '$HOME/.tmux/plugins/tpm/tpm'

#----------------------------------------------------------------------
# Overrides — must come AFTER plugins so they win the binding fight
#----------------------------------------------------------------------
# vim-style selection in copy-mode: v begins selection, y yanks to clipboard.
# (C-v stays bound to rectangle-toggle by default for block selection.)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# prefix+Y: enter copy-mode at the last line of output and start line-wise selection.
# Extend with Up/k/PageUp, finish with y. Designed for quickly grabbing command output.
bind Y copy-mode \; send-keys -X cursor-up \; send-keys -X select-line
